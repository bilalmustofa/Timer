<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Countdown Timer</title>
</head>
<body>
    <div class="wrapper">
        <h1>Countdown Timer</h1>
        <div class="timer-box">
            <div class="time-display">
                <p class="time">19</p>
                <p class="lable">DAYS</p>
            </div>
            <div class="time-display">
                <p class="time">04</p>
                <p class="lable">HOURS</p>
            </div>
            <div class="time-display">
                <p class="time">50</p>
                <p class="lable">MINS</p>
            </div>
            <div class="time-display">
                <p class="time">13</p>
                <p class="lable">SECS</p>
            </div>
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
